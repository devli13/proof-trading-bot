<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>proof-trading-bot · fleet</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slot-text@0.3.1/style.css" />
    <style>
      :root{
        color-scheme: dark;
        --bg:#0b0d12; --surface:#11141c; --surface-2:#161a24; --surface-hover:#161a24; --inset:#0d1017;
        --border:#1e2230; --border-soft:#181c27; --border-strong:#262b3a; --zero-line:#2a3142;
        --tx:#e6e8ee; --tx-2:#c7ccda; --tx-3:#aeb6c8; --tx-4:#8b93a7; --tx-5:#6b7286; --tx-disabled:#555b6b;
        --money-pos:#3ddc84; --money-neg:#ff6b6b;
        --accent:#7aa2ff; --accent-2:#4dd0e1; --flash:rgba(122,162,255,.12);
        --live:#3ddc84; --degraded:#ffd166; --down:#ff6b6b;
        --r-sm:6px; --r-md:8px; --r-lg:12px; --r-xl:14px;
        --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s7:32px;
        --fz-0:11px; --fz-1:12px; --fz-2:13px; --fz-3:15px; --fz-4:18px; --fz-5:22px; --fz-6:20px;
        --fw-reg:400; --fw-med:500; --fw-semi:600;
        --ease:cubic-bezier(.4,0,.2,1); --ease-out:cubic-bezier(.16,1,.3,1);
        --t-fast:120ms; --t-base:200ms; --t-mid:220ms; --t-slow:320ms;
        --z-sticky:30; --z-progress:40; --z-pill-tip:45; --z-modal:50;
        font-feature-settings:'tnum' 1;
      }
      *{box-sizing:border-box;}
      body{margin:0;min-height:100vh;background:var(--bg);color:var(--tx);
        font:var(--fz-2)/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;padding:1rem;}
      html,body{overflow-x:hidden;}
      .wrap{max-width:1180px;margin:0 auto;}
      a{color:var(--accent);text-decoration:none;} a:hover{text-decoration:underline;}
      h1{font-size:var(--fz-6);margin:0 0 var(--s1);font-weight:var(--fw-semi);}
      .sub{color:var(--tx-4);margin:0;font-size:var(--fz-1);}
      .muted{color:var(--tx-4);} .empty{color:var(--tx-disabled);}
      .v,.digits,td,th,.ago,.kpi{font-variant-numeric:tabular-nums;}

      .topbar{position:sticky;top:0;z-index:var(--z-sticky);background:var(--bg);
        border-bottom:1px solid var(--border);padding:var(--s3) 0;margin-bottom:var(--s4);
        display:flex;justify-content:space-between;align-items:center;gap:var(--s3);}
      .topbar-actions{display:flex;align-items:center;gap:var(--s2);position:relative;}

      section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
        padding:var(--s4) var(--s5);margin-bottom:var(--s4);}
      section>h2,.chart-head h2{display:flex;align-items:center;gap:var(--s2);
        font-size:var(--fz-3);font-weight:var(--fw-semi);color:var(--tx-2);margin:0;}
      section>h2::before,.chart-head h2::before{content:'';width:3px;height:14px;border-radius:2px;background:var(--border-strong);}

      .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--s3);
        background:none;border:0;padding:0;margin-bottom:var(--s4);}
      @media(min-width:880px){.kpis{grid-template-columns:2fr 1fr 1fr 1fr;}}
      .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
        padding:var(--s3) var(--s4);display:flex;flex-direction:column;gap:var(--s1);}
      .card .k{color:var(--tx-4);font-size:var(--fz-0);text-transform:uppercase;letter-spacing:.05em;font-weight:var(--fw-semi);}
      .card .v{font-size:var(--fz-4);color:var(--tx);font-weight:var(--fw-med);line-height:1.1;text-align:right;font-variant-numeric:tabular-nums;}
      .card-pnl .v{font-size:var(--fz-5);}
      .card-pnl.is-pos .v{color:var(--money-pos);} .card-pnl.is-neg .v{color:var(--money-neg);}
      .card .digits{display:inline-block;} .card .sym{color:inherit;}
      .card.changed .v{animation:valtint var(--t-base) var(--ease);}

      .chart-sec .chart-head{display:flex;align-items:center;gap:var(--s3);flex-wrap:wrap;margin-bottom:var(--s3);}
      .chart-head .spacer{flex:1;}
      .chartbox{height:clamp(220px,40vw,300px);position:relative;}
      .chart-empty{position:absolute;inset:0;display:grid;place-items:center;font-size:var(--fz-1);}
      .chart-empty[hidden]{display:none;}
      .legend{display:flex;flex-wrap:wrap;gap:var(--s1) var(--s3);margin-top:var(--s3);}
      .leg{display:inline-flex;align-items:center;gap:var(--s1);background:transparent;border:0;
        color:var(--tx-4);font:inherit;font-size:var(--fz-0);cursor:pointer;padding:2px var(--s1);border-radius:var(--r-sm);}
      .leg .sw{width:10px;height:3px;border-radius:2px;display:inline-block;}
      .leg .pv{font-variant-numeric:tabular-nums;}
      .leg .pv.pos{color:var(--money-pos);} .leg .pv.neg{color:var(--money-neg);}
      .leg[aria-pressed=true]{background:var(--surface-2);color:var(--tx);}
      .legend.has-iso .leg:not([aria-pressed=true]){opacity:.4;}

      .filters{display:flex;flex-wrap:wrap;gap:var(--s2);align-items:center;margin-bottom:var(--s4);}
      .fctl{display:inline-flex;align-items:center;gap:var(--s2);}
      .filters label{color:var(--tx-4);font-size:var(--fz-0);text-transform:uppercase;letter-spacing:.04em;}
      select{background:var(--surface);color:var(--tx);border:1px solid var(--border);border-radius:var(--r-md);
        padding:var(--s2) var(--s3);font:inherit;font-size:var(--fz-1);}
      select:hover{border-color:var(--border-strong);}

      .seg{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:2px;}
      .seg button{border:0;background:transparent;color:var(--tx-4);padding:var(--s1) var(--s3);border-radius:var(--r-sm);
        cursor:pointer;font:inherit;font-size:var(--fz-1);transition:background var(--t-fast),color var(--t-fast);}
      .seg button[aria-selected=true],.seg button[aria-checked=true]{background:var(--surface-2);color:var(--tx);}
      .seg button[hidden]{display:none;}

      .ghost-btn,.hdr-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--tx-2);
        border-radius:var(--r-md);padding:var(--s2) var(--s3);cursor:pointer;font:inherit;font-size:var(--fz-1);}
      .ghost-btn:hover,.hdr-btn:hover{border-color:var(--border-strong);}

      .pill{display:inline-flex;align-items:center;gap:var(--s2);background:var(--surface);border:1px solid var(--border);
        border-radius:999px;padding:var(--s1) var(--s3);color:var(--tx-2);font:inherit;font-size:var(--fz-0);cursor:default;
        transition:border-color var(--t-fast) var(--ease);}
      .pill-dot{width:8px;height:8px;border-radius:50%;background:var(--down);
        transition:background var(--t-base) var(--ease),box-shadow var(--t-base) var(--ease);}
      .pill[data-level=green] .pill-dot{background:var(--live);animation:pulse 1.8s var(--ease) infinite;}
      .pill[data-level=yellow] .pill-dot{background:var(--degraded);}
      .pill[data-level=red] .pill-dot{background:var(--down);}
      .pill-label{text-transform:lowercase;letter-spacing:.02em;}
      .pill-tip{position:absolute;top:100%;right:0;margin-top:var(--s2);min-width:230px;background:var(--surface);
        border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--s3);font-size:var(--fz-0);
        z-index:var(--z-pill-tip);box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;grid-template-columns:auto 1fr;gap:var(--s1) var(--s3);}
      .pill-tip dt{color:var(--tx-4);} .pill-tip dd{margin:0;color:var(--tx);text-align:right;font-variant-numeric:tabular-nums;}
      .pill:hover + .pill-tip,.pill:focus-visible + .pill-tip,.pill-tip:hover{display:grid;}

      .bots-hub{margin-bottom:var(--s4);}
      .hub-caption{display:flex;align-items:baseline;gap:var(--s3);margin-bottom:var(--s2);
        font-size:var(--fz-3);font-weight:var(--fw-semi);color:var(--tx-2);}
      .hub-caption .muted{font-size:var(--fz-1);font-weight:var(--fw-reg);}
      .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
      .bots-hub table{width:100%;border-collapse:collapse;font-size:var(--fz-1);}
      .bots-hub thead th{position:sticky;top:0;background:var(--surface);color:var(--tx-4);font-weight:var(--fw-semi);
        text-transform:uppercase;letter-spacing:.04em;font-size:var(--fz-0);padding:var(--s2) var(--s3);
        border-bottom:1px solid var(--border);text-align:right;cursor:pointer;user-select:none;white-space:nowrap;}
      .bots-hub th.l{text-align:left;}
      .bots-hub th[aria-sort=descending]::after{content:' ↓';color:var(--tx-3);}
      .bots-hub th[aria-sort=ascending]::after{content:' ↑';color:var(--tx-3);}
      .bots-hub td{padding:var(--s2) var(--s3);border-bottom:1px solid var(--border-soft);white-space:nowrap;
        font-variant-numeric:tabular-nums;text-align:right;}
      .bots-hub td.l{text-align:left;}
      .bots-hub td.pnl{font-weight:var(--fw-med);}
      .pnl.pos{color:var(--money-pos);} .pnl.neg{color:var(--money-neg);}
      .bot-row{cursor:pointer;transition:background var(--t-fast) var(--ease);box-shadow:inset 2px 0 0 transparent;}
      .bot-row:hover{background:var(--surface-hover);box-shadow:inset 2px 0 0 var(--border-strong);}
      .bot-row[aria-expanded=true]{background:var(--surface-2);box-shadow:inset 2px 0 0 var(--accent);}
      .bot-row.flash{animation:rowflash 600ms var(--ease);}
      .bot-row.row-enter{animation:rowin var(--t-base) var(--ease-out);}
      .caret{display:inline-block;margin-right:var(--s1);transition:transform var(--t-fast) var(--ease);color:var(--tx-4);}
      .bot-row[aria-expanded=true] .caret{transform:rotate(90deg);}
      .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:var(--s1);vertical-align:middle;background:var(--tx-disabled);}
      .dot.alive{background:var(--live);animation:pulse 1.8s var(--ease) infinite;}
      .dot.stale{background:var(--live);opacity:.55;}
      .dot.off{background:transparent;border:1.5px solid var(--tx-disabled);}
      .chip{display:inline-block;background:var(--surface-2);color:var(--tx-3);padding:.02rem .4rem;border-radius:var(--r-sm);
        font-size:var(--fz-0);margin-right:3px;}
      .chip-strat{border:1px solid rgba(122,162,255,.25);}
      .chip-action{background:var(--surface-2);color:var(--tx-3);}

      .drawer-cell{padding:0!important;border-bottom:1px solid var(--border-soft);}
      .drawer{display:grid;grid-template-rows:0fr;opacity:0;
        transition:grid-template-rows var(--t-mid) var(--ease),opacity var(--t-mid) var(--ease);}
      .drawer.show{grid-template-rows:1fr;opacity:1;}
      .drawer-inner{overflow:hidden;min-height:0;padding:0 var(--s2);}
      .drawer.show .drawer-inner{padding:var(--s3) var(--s2);background:var(--surface-2);}
      .drawer-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:var(--s5);}
      @media(max-width:720px){.drawer-grid{grid-template-columns:1fr;}}
      .drawer.show .drawer-inner>*{animation:drawerin var(--t-base) var(--ease-out) both;}
      .dr-id{display:flex;flex-wrap:wrap;align-items:center;gap:var(--s2);margin-bottom:var(--s2);}
      .dr-id .nm{font-size:var(--fz-3);font-weight:var(--fw-semi);color:var(--tx);}
      .dr-money{display:flex;gap:var(--s4);font-size:var(--fz-1);color:var(--tx-4);margin-left:auto;}
      .dr-money b{color:var(--tx);font-weight:var(--fw-med);}
      .dr-h{font-size:var(--fz-0);text-transform:uppercase;letter-spacing:.04em;color:var(--tx-4);margin:var(--s3) 0 var(--s1);font-weight:var(--fw-semi);}
      .spark{height:54px;margin:var(--s1) 0 var(--s2);position:relative;}
      .spark-meta{display:flex;gap:var(--s2);align-items:baseline;font-size:var(--fz-0);margin-bottom:var(--s1);}
      .spark-meta .pv{font-size:var(--fz-2);font-weight:var(--fw-semi);}
      .pv.pos{color:var(--money-pos);} .pv.neg{color:var(--money-neg);}
      .logic{font-size:var(--fz-1);color:var(--tx-3);margin:var(--s1) 0;}
      .logic b{color:var(--tx);font-weight:var(--fw-semi);}
      .side{color:var(--tx-3);} .side .glyph{color:var(--tx-4);}
      .mini{width:100%;border-collapse:collapse;font-size:var(--fz-0);}
      .mini th{color:var(--tx-4);text-align:right;font-weight:var(--fw-semi);padding:2px var(--s2);text-transform:uppercase;letter-spacing:.03em;}
      .mini th.l,.mini td.l{text-align:left;}
      .mini td{padding:2px var(--s2);text-align:right;border-top:1px solid var(--border-soft);white-space:nowrap;}

      details.activity,details.reference{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
        padding:0 var(--s5);margin-bottom:var(--s4);}
      details summary{cursor:pointer;color:var(--tx-4);font-size:.8rem;list-style:none;display:flex;align-items:center;
        gap:var(--s2);padding:var(--s3) 0;}
      details summary::-webkit-details-marker{display:none;}
      details summary .caret{transition:transform var(--t-fast) var(--ease);}
      details[open] summary .caret{transform:rotate(90deg);}
      .activity-body{padding-bottom:var(--s4);}
      .activity .seg{margin-bottom:var(--s3);}
      .activity table,.reference table{width:100%;border-collapse:collapse;font-size:var(--fz-1);}
      .activity th{color:var(--tx-4);text-align:right;padding:var(--s2) var(--s3);font-size:var(--fz-0);
        text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;}
      .activity th.l{text-align:left;}
      .activity td{padding:var(--s2) var(--s3);text-align:right;border-top:1px solid var(--border-soft);white-space:nowrap;}
      .activity td.l{text-align:left;}
      #reference-dl{display:grid;grid-template-columns:160px 1fr;row-gap:var(--s2);column-gap:var(--s4);padding-bottom:var(--s4);margin:0;}
      #reference-dl dt{color:var(--tx);font-weight:var(--fw-semi);}
      #reference-dl dd{margin:0;color:var(--tx-3);font-size:var(--fz-1);}

      .modal{position:fixed;inset:0;z-index:var(--z-modal);display:grid;place-items:center;}
      .modal[hidden]{display:none;}
      .modal-backdrop{position:absolute;inset:0;background:rgba(5,7,11,.6);backdrop-filter:blur(2px);}
      .modal-panel{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);
        width:min(720px,92vw);max-height:80vh;display:flex;flex-direction:column;animation:modalin var(--t-base) var(--ease-out);}
      .modal-head{display:flex;align-items:center;gap:var(--s2);padding:var(--s3) var(--s4);border-bottom:1px solid var(--border);color:var(--tx-2);}
      .modal-body{overflow:auto;padding:var(--s4);margin:0;font-size:var(--fz-1);background:var(--inset);
        border-radius:0 0 var(--r-xl) var(--r-xl);white-space:pre;color:var(--tx-3);}

      .skel{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);}
      .skel::after{content:'';position:absolute;inset:0;transform:translateX(-100%);
        background:linear-gradient(90deg,transparent,rgba(255,255,255,.045) 50%,transparent);animation:shimmer 1.25s var(--ease) infinite;}
      .skel-card{height:74px;} .skel-chart{height:280px;border-radius:var(--r-lg);}
      .skel-row{height:30px;margin:var(--s1) 0;border-radius:var(--r-sm);background:var(--surface-2);animation:rowpulse 1.4s var(--ease) infinite;}

      #prog{position:fixed;top:0;left:0;height:2px;width:0;z-index:var(--z-progress);opacity:0;
        background:linear-gradient(90deg,var(--accent),var(--accent-2));box-shadow:0 0 8px rgba(122,162,255,.5);
        transition:width var(--t-slow) var(--ease),opacity var(--t-base) var(--ease);}
      #prog.run{opacity:1;width:75%;transition:width 1.4s cubic-bezier(.1,.7,.3,1),opacity var(--t-base);}
      #prog.done{opacity:0;width:100%;transition:width 160ms var(--ease),opacity 240ms 120ms var(--ease);}

      .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
      .skip:focus{position:fixed;top:8px;left:8px;width:auto;height:auto;clip:auto;background:var(--surface);
        padding:var(--s2) var(--s3);border:1px solid var(--border);border-radius:var(--r-md);z-index:var(--z-modal);}
      :where(a,button,select,[tabindex],[role=button],[role=radio],.tablewrap):focus-visible{
        outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-sm);}
      :focus:not(:focus-visible){outline:none;}
      .bot-row:focus-visible{outline-offset:-2px;}

      @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,220,132,.45)}70%{box-shadow:0 0 0 6px rgba(61,220,132,0)}100%{box-shadow:0 0 0 0 rgba(61,220,132,0)}}
      @keyframes shimmer{100%{transform:translateX(100%)}}
      @keyframes rowpulse{0%,100%{opacity:.5}50%{opacity:.85}}
      @keyframes rowflash{0%{background:var(--flash)}100%{background:transparent}}
      @keyframes valtint{0%{color:var(--accent)}100%{color:inherit}}
      @keyframes rowin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
      @keyframes drawerin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
      @keyframes modalin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

      @media(prefers-reduced-motion:reduce){
        *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;
          transition-duration:.001ms!important;scroll-behavior:auto!important;}
        .skel::after,.dot.alive,.pill[data-level=green] .pill-dot{animation:none!important;}
        .dot.alive{box-shadow:none;} .flash{animation:none;background:transparent;}
      }
      @media(max-width:559px){
        .topbar{flex-direction:column;align-items:flex-start;gap:var(--s2);}
        select{flex:1 1 45%;min-width:120px;}
      }
    </style>
  </head>
  <body>
    <a href="#bots-hub" class="sr-only skip">Skip to fleet</a>
    <div id="prog" aria-hidden="true"></div>
    <div id="live" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <div class="wrap">
      <header class="topbar">
        <div class="topbar-id">
          <h1>proof-trading-bot <span class="muted">· fleet</span></h1>
          <p class="sub">Proof devnet · paper money · updated <time id="asof" datetime="" title="">—</time></p>
        </div>
        <div class="topbar-actions">
          <button id="pill" class="pill" data-level="yellow" aria-describedby="pill-tip">
            <span class="pill-dot"></span><span class="pill-label">connecting</span>
          </button>
          <div id="pill-tip" class="pill-tip" role="tooltip"></div>
          <button id="json-btn" class="hdr-btn">{ } JSON</button>
        </div>
      </header>

      <section id="kpis" class="kpis" aria-label="Fleet totals" aria-busy="true"></section>

      <section id="chart-sec" class="chart-sec">
        <div class="chart-head">
          <h2>Performance</h2>
          <span class="spacer"></span>
          <div class="seg" id="chart-range" role="tablist" aria-label="Timeframe">
            <button data-range="1h" role="tab" aria-selected="false">1h</button>
            <button data-range="1d" role="tab" aria-selected="true">1d</button>
            <button data-range="7d" role="tab" aria-selected="false" hidden>7d</button>
            <button data-range="30d" role="tab" aria-selected="false" hidden>30d</button>
            <button data-range="all" role="tab" aria-selected="false">all</button>
          </div>
          <div class="seg" id="chart-mode" role="tablist" aria-label="Chart metric">
            <button data-mode="pnl" role="tab" aria-selected="true">P&amp;L</button>
            <button data-mode="equity" role="tab" aria-selected="false">Equity</button>
          </div>
        </div>
        <div class="chartbox" aria-busy="true">
          <canvas id="chart" role="img" aria-label="P&L since start per bot"></canvas>
          <div id="chart-empty" class="chart-empty muted" hidden>no equity history in range</div>
        </div>
        <div id="chart-legend" class="legend"></div>
        <div id="chart-summary" class="sr-only"></div>
      </section>

      <div class="filters" role="group" aria-label="Filters">
        <div class="seg" id="f-scope" role="radiogroup" aria-label="Scope">
          <button role="radio" aria-checked="true" data-scope="active">Active</button>
          <button role="radio" aria-checked="false" data-scope="all">All</button>
        </div>
        <span class="fctl"><label for="f-strategy">strategy</label><select id="f-strategy"></select></span>
        <span class="fctl"><label for="f-tag">tag</label><select id="f-tag"></select></span>
        <span class="fctl"><label for="f-market">market</label><select id="f-market"></select></span>
        <button id="f-clear" class="ghost-btn" aria-label="Clear all filters">clear</button>
      </div>

      <div class="bots-hub" id="bots-hub">
        <div class="hub-caption"><span>Bots</span><span id="f-count" class="muted"></span></div>
        <div class="tablewrap" role="region" aria-label="Bots fleet" tabindex="0">
          <table id="bots-table"><thead id="bots-head"></thead></table>
        </div>
      </div>

      <details id="activity" class="activity">
        <summary><span class="caret" aria-hidden="true">›</span> Activity <span class="muted" id="activity-count"></span></summary>
        <div class="activity-body">
          <div class="seg" id="activity-tabs" role="tablist">
            <button role="tab" aria-selected="true" data-tab="orders">Orders</button>
            <button role="tab" aria-selected="false" data-tab="decisions">Decisions</button>
          </div>
          <div id="activity-orders" class="tablewrap" role="region" aria-label="Recent orders" tabindex="0"></div>
          <div id="activity-decisions" class="tablewrap" role="region" aria-label="Decisions" tabindex="0" hidden></div>
        </div>
      </details>

      <details id="reference" class="reference">
        <summary><span class="caret" aria-hidden="true">›</span> Strategy reference</summary>
        <dl id="reference-dl"></dl>
      </details>

      <p class="sub" style="text-align:center;margin:var(--s5) 0;">
        <a href="/api/status">/api/status</a> · <a href="/api/stats">/api/stats</a> ·
        <a href="https://github.com/devli13/proof-trading-bot">source</a>
      </p>
    </div>

    <div id="json-modal" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-close></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="jm-title">
        <div class="modal-head">
          <span id="jm-title">/api/stats</span><span style="flex:1"></span>
          <button id="jm-copy" class="hdr-btn">copy</button>
          <button id="jm-close" class="hdr-btn" aria-label="Close" data-close>✕</button>
        </div>
        <pre id="jm-body" class="modal-body"></pre>
      </div>
    </div>

    <script>
      // ── helpers ──────────────────────────────────────────────────────────
      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const MKT = { 7: "HYPE", 20300: "HYPE-CPY", 20301: "HYPE-CPN", 20302: "HYPE-EBY", 20303: "HYPE-EBN", 203: "HYPE #203" };
      const mkt = (m) => MKT[m] || ("m" + m);
      const usd = (m) => { if (m == null || isNaN(m)) return "—"; const v = m / 1e6; return (v < 0 ? "-" : "") + "$" + Math.abs(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };
      const pnlStr = (m) => { if (m == null || isNaN(m)) return "—"; const v = m / 1e6; const g = v > 0 ? "+" : v < 0 ? "-" : ""; return g + "$" + Math.abs(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };
      const sign = (n) => (n == null ? "" : n > 0 ? "pos" : n < 0 ? "neg" : "");
      const relTime = (t) => { if (!t) return "—"; const s = (Date.now() - Date.parse(t)) / 1000; if (s < 0) return "just now"; if (s < 10) return "just now"; if (s < 60) return Math.floor(s) + "s ago"; if (s < 3600) return Math.floor(s / 60) + "m ago"; if (s < 86400) return Math.floor(s / 3600) + "h ago"; return Math.floor(s / 86400) + "d ago"; };
      const absTime = (t) => (t ? new Date(t).toLocaleString() : "");
      // Only registry-enabled bots can be alive/stale; legacy (main, enabled=null) and
      // disabled bots get a hollow "off" dot — they aren't part of the running fleet.
      const dotClass = (b) => (b.enabled !== true ? "off" : b.lastTick && Date.now() - Date.parse(b.lastTick) < 10000 ? "alive" : "stale");
      const dotWord = (c) => ({ off: "Inactive", alive: "Alive", stale: "Stale" }[c] || "");
      const dim = (hex, a) => hex + Math.round(a * 255).toString(16).padStart(2, "0");
      const side = (s) => s === "Buy" ? '<span class="side"><span class="glyph">▲</span> Buy</span>' : '<span class="side"><span class="glyph">▼</span> Sell</span>';
      const num = (v) => (v == null ? 0 : Number(v));

      // ── state ────────────────────────────────────────────────────────────
      let DATA = null, STATUS = null, lastLatency = null, statsOk = false, statusOk = false, prevLevel = null;
      let chart = null, chartMode = "pnl", isoBot = null, currentRange = "1d", firstData = true;
      const COLOR = {}; const sparks = new Map(); const ROLLERS = {};
      const F = { scope: "active", strategy: "all", tag: "all", market: "all" };
      const expanded = new Set();
      let sortKey = "pnl", sortDir = -1;
      let statsTimer = null, statusTimer = null, inflightStats = null, progT = null;
      const groups = {}; // bot id -> <tbody>
      const RM = matchMedia("(prefers-reduced-motion:reduce)"); window.__RM = RM.matches; RM.onchange = () => (window.__RM = RM.matches);
      const LINE_COLORS = ["#7aa2ff", "#c792ea", "#4dd0e1", "#ffd166", "#a3e635", "#f78fb3", "#60a5fa", "#34d399", "#e0a3ff", "#5eead4", "#fbbf24", "#93c5fd"];
      const COLS = [
        { k: "bot", t: "Bot", l: 1 }, { k: "strategies", t: "Strategies", l: 1 }, { k: "markets", t: "Markets", l: 1 },
        { k: "pnl", t: "PnL" }, { k: "equity", t: "Equity" }, { k: "volume", t: "Vol" }, { k: "trades", t: "Trades" }, { k: "lastTick", t: "Tick" },
      ];

      // ── progress bar ─────────────────────────────────────────────────────
      const prog = document.getElementById("prog");
      function progStart() { clearTimeout(progT); progT = setTimeout(() => { prog.className = ""; void prog.offsetWidth; prog.className = "run"; }, 180); }
      function progDone() { clearTimeout(progT); prog.className = "done"; }

      // ── slot-text rollers ────────────────────────────────────────────────
      function initRollers() {
        if (!window.__slotText) return;
        for (const key of ["pnl", "volume", "equity", "bots"]) {
          const el = document.querySelector(`[data-kpi="${key}"]`);
          if (el && !ROLLERS[key]) { try { ROLLERS[key] = window.__slotText(el, el.textContent || "0"); } catch (e) {} }
        }
      }
      window.addEventListener("slot-ready", () => { initRollers(); if (DATA) renderKpis(); });
      function setDigits(key, str) {
        const el = document.querySelector(`[data-kpi="${key}"]`);
        if (!el) return;
        if (ROLLERS[key]) { try { ROLLERS[key].set(str); return; } catch (e) {} }
        el.textContent = str;
      }

      // ── mount: skeletons + static scaffold ───────────────────────────────
      function mount() {
        const kpis = document.getElementById("kpis");
        kpis.innerHTML = Array(4).fill('<div class="skel skel-card"></div>').join("");
        document.querySelector(".chartbox").insertAdjacentHTML("afterbegin", '<div class="skel skel-chart" id="chart-skel"></div>');
        document.getElementById("bots-head").innerHTML = "<tr>" + COLS.map((c) => `<th class="${c.l ? "l" : ""}" data-sort="${c.k}" tabindex="0" role="columnheader">${c.t}</th>`).join("") + '<th aria-hidden="true"></th></tr>';
        const tb = document.createElement("tbody"); tb.id = "skel-body";
        tb.innerHTML = Array(8).fill(`<tr><td colspan="9"><div class="skel-row"></div></td></tr>`).join("");
        document.getElementById("bots-table").appendChild(tb);
        wireListeners();
      }

      // ── KPI cards ────────────────────────────────────────────────────────
      function buildKpiCards() {
        const kpis = document.getElementById("kpis");
        kpis.innerHTML =
          `<div class="card card-pnl" id="card-pnl"><div class="k">Fleet PnL <span class="muted" id="pnl-range"></span></div><div class="v"><span class="sym" id="pnl-sym"></span><span class="digits" data-kpi="pnl">0.00</span></div></div>` +
          `<div class="card"><div class="k">Volume</div><div class="v"><span class="sym">$</span><span class="digits" data-kpi="volume">0.00</span></div></div>` +
          `<div class="card"><div class="k">Equity</div><div class="v"><span class="sym">$</span><span class="digits" data-kpi="equity">0.00</span></div></div>` +
          `<div class="card"><div class="k">Active bots</div><div class="v"><span class="digits" data-kpi="bots">0</span></div></div>`;
        kpis.removeAttribute("aria-busy");
        initRollers();
      }
      let lastKpi = {};
      function renderKpis() {
        const a = DATA.aggregate;
        const pnlCard = document.getElementById("card-pnl");
        pnlCard.classList.toggle("is-pos", a.pnl > 0); pnlCard.classList.toggle("is-neg", a.pnl < 0);
        document.getElementById("pnl-sym").textContent = a.pnl > 0 ? "+$" : a.pnl < 0 ? "-$" : "$";
        document.getElementById("pnl-range").textContent = "· " + currentRange;
        const vals = {
          pnl: Math.abs(a.pnl / 1e6).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
          volume: (a.volume / 1e6).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
          equity: (a.equity / 1e6).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
          bots: a.activeBots + " / " + a.bots,
        };
        for (const k in vals) {
          if (vals[k] !== lastKpi[k]) {
            setDigits(k, vals[k]);
            const card = document.querySelector(`[data-kpi="${k}"]`).closest(".card");
            card.classList.remove("changed"); void card.offsetWidth; card.classList.add("changed");
          }
        }
        lastKpi = vals;
      }

      // ── filters ──────────────────────────────────────────────────────────
      function fillSelect(id, values, label, fmt) {
        const el = document.getElementById(id); if (!el) return;
        const cur = el.value || "all";
        el.innerHTML = `<option value="all">all ${esc(label)}</option>` + values.map((v) => `<option value="${esc(String(v))}">${esc(fmt ? fmt(v) : String(v))}</option>`).join("");
        if ([...el.options].some((o) => o.value === cur)) el.value = cur;
      }
      function scopeBots() { return DATA.bots.filter((b) => !(F.scope === "active" && b.enabled !== true)); }
      function refreshFilterOptions() {
        const inScope = scopeBots();
        fillSelect("f-strategy", [...new Set(inScope.flatMap((b) => b.strategies || []))].sort(), "strategies");
        fillSelect("f-tag", [...new Set(inScope.flatMap((b) => b.tags || []))].sort(), "tags");
        fillSelect("f-market", [...new Set(inScope.flatMap((b) => (b.markets === "all" ? [] : b.markets || [])))].sort((a, b) => a - b), "markets", mkt);
      }
      function botMatches(b) {
        if (F.scope === "active" && b.enabled !== true) return false;
        if (F.strategy !== "all" && !(b.strategies || []).includes(F.strategy)) return false;
        if (F.tag !== "all" && !(b.tags || []).includes(F.tag)) return false;
        if (F.market !== "all" && b.markets !== "all" && !(b.markets || []).map(String).includes(F.market)) return false;
        return true;
      }
      function filteredSorted() {
        const list = DATA.bots.filter(botMatches);
        const val = (b) => (sortKey === "bot" ? b.bot : b[sortKey] ?? -Infinity);
        list.sort((a, c) => { const x = val(a), y = val(c); if (x < y) return -1 * sortDir; if (x > y) return 1 * sortDir; return a.bot < c.bot ? -1 : 1; });
        return list;
      }

      // ── bots table rows + drawers ────────────────────────────────────────
      function cellHTML(b, key) {
        switch (key) {
          case "bot": { const dc = dotClass(b); const strat = (b.strategies || []).slice(0, 1).join(""); return `<td class="l caret-cell"><span class="caret" aria-hidden="true">›</span><span class="dot ${dc}" aria-hidden="true"></span><span class="sr-only">${dotWord(dc)}</span>${esc(b.bot)}</td>`; }
          case "strategies": { const s = b.strategies || []; const shown = s.slice(0, 2).map((x) => `<span class="chip chip-strat">${esc(x)}</span>`).join(""); return `<td class="l">${shown || "—"}${s.length > 2 ? `<span class="chip">+${s.length - 2}</span>` : ""}</td>`; }
          case "markets": { const m = b.markets === "all" ? "all" : (b.markets || []).slice(0, 2).map(mkt).join(", "); const extra = b.markets !== "all" && (b.markets || []).length > 2 ? ` +${b.markets.length - 2}` : ""; return `<td class="l muted">${esc(m)}${extra}</td>`; }
          case "pnl": return `<td class="num pnl ${sign(b.pnl)}" data-cell="pnl">${pnlStr(b.pnl)}</td>`;
          case "equity": return `<td class="num" data-cell="equity">${usd(b.equity)}</td>`;
          case "volume": return `<td class="num" data-cell="volume">${usd(b.volume)}</td>`;
          case "trades": return `<td class="num" data-cell="trades">${b.trades ?? 0}</td>`;
          case "lastTick": return `<td class="num"><time class="ago" datetime="${esc(b.lastTick)}" title="${esc(absTime(b.lastTick))}" data-ts="${esc(b.lastTick)}">${relTime(b.lastTick)}</time></td>`;
        }
        return "<td></td>";
      }
      function makeGroup(b) {
        const id = b.bot;
        const g = document.createElement("tbody"); g.className = "bot-group"; g.dataset.bot = id;
        g.innerHTML =
          `<tr class="bot-row row-enter" role="button" tabindex="0" aria-expanded="false" aria-controls="d-${esc(id)}" id="r-${esc(id)}" data-bot="${esc(id)}">` +
          COLS.map((c) => cellHTML(b, c.k)).join("") + `<td aria-hidden="true"></td></tr>` +
          `<tr class="drawer-row" hidden><td colspan="9" class="drawer-cell"><div id="d-${esc(id)}" class="drawer" role="region" aria-labelledby="r-${esc(id)}"><div class="drawer-inner" data-built="0"></div></div></td></tr>`;
        groups[id] = g;
        return g;
      }
      function updateGroup(b) {
        const g = groups[b.bot]; if (!g) return;
        const row = g.querySelector(".bot-row");
        let changed = false;
        const set = (sel, html) => { const el = row.querySelector(sel); if (el && el.innerHTML !== html) { el.innerHTML = html; changed = true; } };
        // money/number cells
        for (const key of ["pnl", "equity", "volume", "trades"]) {
          const td = row.querySelector(`[data-cell="${key}"]`);
          const txt = key === "pnl" ? pnlStr(b.pnl) : key === "trades" ? String(b.trades ?? 0) : usd(b[key]);
          if (td && td.textContent !== txt) { td.textContent = txt; changed = true; if (key === "pnl") td.className = `num pnl ${sign(b.pnl)}`; }
        }
        // tick time + dot freshness
        const time = row.querySelector("time"); if (time) { time.dataset.ts = b.lastTick || ""; time.setAttribute("title", absTime(b.lastTick)); time.textContent = relTime(b.lastTick); }
        const dc = dotClass(b), dotEl = row.querySelector(".dot"); if (dotEl && !dotEl.classList.contains(dc)) dotEl.className = `dot ${dc}`;
        // strategies/markets (rarely change)
        set("td.l[data-skip]", null);
        if (changed && !firstData) { row.classList.remove("flash"); void row.offsetWidth; row.classList.add("flash"); setTimeout(() => row.classList.remove("flash"), 650); }
        // refresh open drawer
        if (expanded.has(b.bot)) refreshDrawer(b.bot, b);
      }

      function buildDrawer(b) {
        const inner = groups[b.bot].querySelector(".drawer-inner");
        const myDec = (DATA.decisions || []).filter((d) => d.bot === b.bot);
        const myOrd = (DATA.recentOrders || []).filter((o) => o.bot === b.bot).slice(0, 12);
        inner.innerHTML =
          `<div class="drawer-grid">` +
            `<div class="dr-left">` +
              `<div class="dr-id"><span class="nm">${esc(b.bot)}</span>` +
                `<span class="chip">${b.enabled === false ? "disabled" : dotClass(b) === "alive" ? "alive" : "idle"}</span>` +
                (b.tags || []).map((t) => `<span class="chip">${esc(t)}</span>`).join("") +
                `<span class="dr-money">Bal <b>${usd(b.balance)}</b> · Eq <b>${usd(b.equity)}</b></span>` +
              `</div>` +
              `<div class="dr-h">Equity (${currentRange})</div>` +
              `<div class="spark" data-spark="${esc(b.bot)}"><canvas></canvas></div>` +
              `<div class="spark-meta" data-sparkmeta="${esc(b.bot)}"></div>` +
              `<div class="dr-h">Open positions</div>${positionsHTML(b)}` +
            `</div>` +
            `<div class="dr-right">` +
              `<div class="dr-h">Decisions (24h)</div>${decisionsHTML(myDec)}` +
              `<div class="dr-h">Recent orders</div>${ordersMiniHTML(myOrd)}` +
              `<div class="dr-h">Strategy</div>${(b.strategies || []).map((s) => `<div class="logic"><b>${esc(s)}</b> — ${esc((DATA.strategyLogic || {})[s] || "—")}</div>`).join("")}` +
            `</div>` +
          `</div>`;
        inner.dataset.built = "1";
        mountSpark(b);
      }
      function refreshDrawer(b) {
        const bot = typeof b === "string" ? b : b.bot;
        const full = DATA.bots.find((x) => x.bot === bot); if (!full) return;
        const inner = groups[bot] && groups[bot].querySelector(".drawer-inner");
        if (!inner || inner.dataset.built !== "1") return;
        buildDrawer(full); // cheap rebuild keeps it correct; sparkline re-mounts
      }
      function positionsHTML(b) {
        const ps = b.positions || [];
        if (!ps.length) return '<div class="empty">flat — no open positions</div>';
        return `<table class="mini"><thead><tr><th class="l">Market</th><th class="l">Side</th><th>Size</th><th>Entry</th></tr></thead><tbody>` +
          ps.map((p) => `<tr><td class="l">${esc(mkt(p.market))}</td><td class="l">${side(p.side)}</td><td>${esc(p.size)}</td><td>${usd(num(p.entryPrice))}</td></tr>`).join("") + `</tbody></table>`;
      }
      function decisionsHTML(ds) {
        if (!ds.length) return '<div class="empty">no decisions in 24h</div>';
        return ds.slice(0, 14).map((d) => `<div style="font-size:var(--fz-1);margin:2px 0;"><span class="chip chip-action">${esc(d.action)}</span> <span class="muted">${esc(d.strategy)}</span> ×${d.c} <span class="muted">· ${relTime(d.last)}</span></div>`).join("");
      }
      function ordersMiniHTML(os) {
        if (!os.length) return '<div class="empty">no recent orders</div>';
        return `<table class="mini"><thead><tr><th class="l">Time</th><th class="l">Mkt</th><th class="l">Side</th><th>Price</th><th>Qty</th></tr></thead><tbody>` +
          os.map((o) => `<tr><td class="l muted">${esc(relTime(o.ts))}</td><td class="l">${esc(mkt(o.market))}</td><td class="l">${side(o.side)}</td><td>${usd(num(o.price))}</td><td>${esc(o.quantity)}</td></tr>`).join("") + `</tbody></table>`;
      }
      function mountSpark(b) {
        const wrap = groups[b.bot] && groups[b.bot].querySelector(`[data-spark="${CSS.escape(b.bot)}"] canvas`);
        const meta = groups[b.bot] && groups[b.bot].querySelector(`[data-sparkmeta="${CSS.escape(b.bot)}"]`);
        const old = sparks.get(b.bot); if (old) { old.destroy(); sparks.delete(b.bot); }
        const s = b.series || [];
        if (!wrap || s.length < 2) { if (meta) meta.innerHTML = `<span class="pv ${sign(b.pnl)}">${pnlStr(b.pnl)}</span><span class="empty">insufficient history</span>`; return; }
        const base = s[0].equity, data = s.map((p) => ({ x: Date.parse(p.ts), y: (p.equity - base) / 1e6 }));
        const last = data[data.length - 1].y, stroke = last > 0 ? "#3ddc84" : last < 0 ? "#ff6b6b" : COLOR[b.bot] || "#7aa2ff";
        const eqs = s.map((p) => p.equity);
        if (meta) meta.innerHTML = `<span class="pv ${sign(b.pnl)}">${pnlStr(b.pnl)}</span><span class="muted">${s.length} pts · ${relTime(s[0].ts)}→now · ${usd(Math.min(...eqs))}–${usd(Math.max(...eqs))}</span>`;
        const inst = new Chart(wrap, {
          type: "line",
          data: { datasets: [{ data, borderColor: stroke, borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 3, tension: 0.2, fill: { target: "origin", above: "rgba(61,220,132,0.08)", below: "rgba(255,107,107,0.08)" } }] },
          options: { responsive: true, maintainAspectRatio: false, animation: false, interaction: { mode: "index", intersect: false }, plugins: { legend: { display: false }, tooltip: { enabled: true, displayColors: false, callbacks: { title: (i) => new Date(i[0].parsed.x).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }), label: (it) => (it.parsed.y >= 0 ? "+" : "") + "$" + it.parsed.y.toFixed(2) } } }, scales: { x: { type: "linear", display: false }, y: { display: false } } },
        });
        sparks.set(b.bot, inst);
      }

      function toggleBot(id) {
        const open = expanded.has(id);
        const g = groups[id]; if (!g) return;
        const row = g.querySelector(".bot-row"), drow = g.querySelector(".drawer-row"), dr = g.querySelector(".drawer");
        if (!open) {
          expanded.add(id); row.setAttribute("aria-expanded", "true"); drow.hidden = false;
          const full = DATA.bots.find((b) => b.bot === id);
          if (dr.querySelector(".drawer-inner").dataset.built === "0" && full) buildDrawer(full);
          requestAnimationFrame(() => dr.classList.add("show"));
          isoBot = id; applyIsolation();
        } else {
          expanded.delete(id); row.setAttribute("aria-expanded", "false"); dr.classList.remove("show");
          const fin = () => { if (!expanded.has(id)) { drow.hidden = true; const sp = sparks.get(id); if (sp) { sp.destroy(); sparks.delete(id); } } };
          dr.addEventListener("transitionend", fin, { once: true }); setTimeout(fin, 320);
          if (isoBot === id) { isoBot = [...expanded][0] || null; applyIsolation(); }
        }
      }

      // ── chart ────────────────────────────────────────────────────────────
      function assignColors() { DATA.bots.map((b) => b.bot).sort().forEach((id, i) => { if (!COLOR[id]) COLOR[id] = LINE_COLORS[i % LINE_COLORS.length]; }); }
      function withGaps(pts) { const out = []; for (let i = 0; i < pts.length; i++) { if (i && pts[i].x - pts[i - 1].x > 5 * 60000) out.push({ x: (pts[i].x + pts[i - 1].x) / 2, y: null }); out.push(pts[i]); } return out; }
      function buildDatasets() {
        return DATA.bots.filter((b) => botMatches(b) && (b.series || []).length >= 2).map((b) => ({
          botId: b.bot, label: b.bot,
          data: withGaps(b.series.map((p) => ({ x: Date.parse(p.ts), y: chartMode === "pnl" ? (p.equity - b.series[0].equity) / 1e6 : p.equity / 1e6 }))),
          borderColor: COLOR[b.bot], backgroundColor: COLOR[b.bot], borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4, tension: 0.15, spanGaps: false,
        }));
      }
      const zeroLinePlugin = { id: "zeroLine", beforeDatasetsDraw(c) { if (chartMode !== "pnl") return; const y = c.scales.y.getPixelForValue(0), { left, right } = c.chartArea, x = c.ctx; x.save(); x.strokeStyle = "#2a3142"; x.lineWidth = 1; x.setLineDash([3, 3]); x.beginPath(); x.moveTo(left, y); x.lineTo(right, y); x.stroke(); x.restore(); } };
      function mountChart() {
        const ds = buildDatasets();
        chart = new Chart(document.getElementById("chart"), {
          type: "line", data: { datasets: ds }, plugins: [zeroLinePlugin],
          options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            interaction: { mode: "index", intersect: false, axis: "x" },
            plugins: {
              legend: { display: false },
              tooltip: { backgroundColor: "#11141c", borderColor: "#1e2230", borderWidth: 1, titleColor: "#c7ccda", bodyColor: "#e6e8ee", padding: 8, cornerRadius: 8, boxWidth: 8, boxHeight: 8, itemSort: (a, b) => b.parsed.y - a.parsed.y, filter: (it) => !isoBot || it.dataset.botId === isoBot, callbacks: { title: (i) => new Date(i[0].parsed.x).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }), label: (it) => { const v = it.parsed.y; return " " + it.dataset.botId + "  " + (chartMode === "pnl" ? (v >= 0 ? "+" : "") + "$" + v.toFixed(2) : "$" + v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })); }, labelColor: (it) => ({ borderColor: it.dataset.borderColor, backgroundColor: it.dataset.borderColor }) } } },
            scales: {
              x: { type: "linear", grid: { color: "#181c27" }, ticks: { color: "#8b93a7", maxTicksLimit: 6, maxRotation: 0, autoSkip: true, callback: (v) => new Date(v).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) } },
              y: { beginAtZero: false, grid: { color: "#181c27" }, ticks: { color: "#8b93a7", callback: (v) => (chartMode === "pnl" ? (v > 0 ? "+" : "") + "$" + v.toLocaleString(undefined, { maximumFractionDigits: 2 }) : "$" + v.toLocaleString()) } },
            },
          },
        });
      }
      function updateChart() {
        if (!chart) { mountChart(); }
        else { chart.data.datasets = buildDatasets(); chart.update("none"); }
        const has = chart.data.datasets.length > 0;
        document.getElementById("chart-empty").hidden = has;
        document.querySelector(".chartbox").setAttribute("aria-busy", "false");
        applyIsolation(); renderLegend();
      }
      function applyIsolation() {
        if (!chart) return;
        chart.data.datasets.forEach((d) => {
          if (isoBot === null) { d.borderColor = COLOR[d.botId]; d.borderWidth = 1.5; d.pointHoverRadius = 4; }
          else if (d.botId === isoBot) { d.borderColor = COLOR[d.botId]; d.borderWidth = 2.5; d.pointHoverRadius = 5; }
          else { d.borderColor = dim(COLOR[d.botId], 0.12); d.borderWidth = 1; d.pointHoverRadius = 0; }
        });
        chart.update("none");
        const leg = document.getElementById("chart-legend"); leg.classList.toggle("has-iso", isoBot !== null);
        leg.querySelectorAll(".leg").forEach((el) => el.setAttribute("aria-pressed", String(el.dataset.bot === isoBot)));
        document.querySelectorAll(".bot-row").forEach((r) => { /* row highlight handled by aria-expanded */ });
      }
      function renderLegend() {
        const leg = document.getElementById("chart-legend");
        const list = DATA.bots.filter((b) => botMatches(b) && (b.series || []).length >= 2).sort((a, c) => (c.pnl ?? 0) - (a.pnl ?? 0));
        leg.innerHTML = list.map((b) => `<button class="leg" data-bot="${esc(b.bot)}" aria-pressed="${b.bot === isoBot}"><span class="sw" style="background:${COLOR[b.bot]}"></span><span class="nm">${esc(b.bot)}</span><span class="pv ${sign(b.pnl)}">${pnlStr(b.pnl)}</span></button>`).join("");
        const summ = document.getElementById("chart-summary");
        if (list.length) { const best = list[0], worst = list[list.length - 1]; summ.textContent = `${list.length} bots shown. Best ${best.bot} ${pnlStr(best.pnl)}. Worst ${worst.bot} ${pnlStr(worst.pnl)}.`; }
      }

      // ── activity + reference (lazy) ──────────────────────────────────────
      let activityTab = "orders", activityBuilt = false;
      function renderActivity() {
        if (!document.getElementById("activity").open) return;
        const oc = document.getElementById("activity-orders"), dc = document.getElementById("activity-decisions");
        const orders = DATA.recentOrders || [], decs = DATA.decisions || [];
        oc.innerHTML = `<table><thead><tr><th class="l">Time</th><th class="l">Bot</th><th class="l">Strategy</th><th class="l">Market</th><th class="l">Side</th><th>Price</th><th>Qty</th><th>tx</th></tr></thead><tbody>` +
          orders.slice(0, 60).map((o) => `<tr><td class="l muted">${esc(relTime(o.ts))}</td><td class="l">${esc(o.bot)}</td><td class="l muted">${esc(o.strategy)}</td><td class="l">${esc(mkt(o.market))}</td><td class="l">${side(o.side)}</td><td>${usd(num(o.price))}</td><td>${esc(o.quantity)}</td><td class="muted">${esc(o.check_tx_code ?? "")}</td></tr>`).join("") + `</tbody></table>`;
        dc.innerHTML = `<table><thead><tr><th class="l">Bot</th><th class="l">Strategy</th><th class="l">Action</th><th>Count</th><th>Last</th></tr></thead><tbody>` +
          decs.slice(0, 80).map((d) => `<tr><td class="l">${esc(d.bot)}</td><td class="l muted">${esc(d.strategy)}</td><td class="l"><span class="chip chip-action">${esc(d.action)}</span></td><td>${d.c}</td><td class="muted">${esc(relTime(d.last))}</td></tr>`).join("") + `</tbody></table>`;
        document.getElementById("activity-count").textContent = `· ${orders.length} orders · ${decs.length} decision groups`;
        activityBuilt = true;
      }
      function renderReference() {
        const dl = document.getElementById("reference-dl");
        if (dl.children.length) return;
        dl.innerHTML = Object.entries(DATA.strategyLogic || {}).map(([k, v]) => `<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join("");
      }

      // ── status pill ──────────────────────────────────────────────────────
      function recomputePill() {
        const pill = document.getElementById("pill");
        const dataAge = DATA && DATA.asOf ? Date.now() - Date.parse(DATA.asOf) : Infinity;
        let level;
        // "live" = fresh data flowing + both read endpoints up. Latency is shown in the
        // tooltip but doesn't gate green (the /api/status gateway hop can be slow).
        if (statsOk && statusOk && dataAge < 30000) level = "green";
        else if (!statsOk || dataAge > 180000) level = "red";
        else level = "yellow";
        pill.dataset.level = level;
        pill.querySelector(".pill-label").textContent = { green: "live", yellow: "degraded", red: "down" }[level];
        if (level !== prevLevel) { document.getElementById("live").textContent = "Status: " + pill.querySelector(".pill-label").textContent; prevLevel = level; }
        renderPillTip();
      }
      function renderPillTip() {
        const tip = document.getElementById("pill-tip");
        const alive = DATA ? DATA.bots.filter((b) => b.enabled === true && b.lastTick && Date.now() - Date.parse(b.lastTick) < 10000).length : 0;
        const active = DATA ? DATA.aggregate.activeBots : 0;
        const lastTick = DATA ? DATA.bots.reduce((m, b) => (b.lastTick && (!m || b.lastTick > m) ? b.lastTick : m), null) : null;
        const rows = [
          ["Network", STATUS && STATUS.network ? esc(STATUS.network) : "—"],
          ["Chain height", STATUS && STATUS.height != null ? esc(STATUS.height) : "—"],
          ["API latency", lastLatency != null ? lastLatency + " ms" : "—"],
          ["Data fresh", DATA ? relTime(DATA.asOf) : "—"],
          ["Bots alive", `${alive} / ${active}`],
          ["Last tick", relTime(lastTick)],
        ];
        tip.innerHTML = rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join("");
      }

      // ── apply data (diff + animate) ──────────────────────────────────────
      function applyData() {
        if (firstData) { document.getElementById("chart-skel") && document.getElementById("chart-skel").remove(); document.getElementById("skel-body") && document.getElementById("skel-body").remove(); buildKpiCards(); assignColors(); refreshFilterOptions(); }
        assignColors();
        renderKpis();
        // header freshness
        const asof = document.getElementById("asof"); asof.dateTime = DATA.asOf || ""; asof.title = absTime(DATA.asOf); asof.textContent = relTime(DATA.asOf);
        // rows
        const list = filteredSorted(); const wanted = new Set(list.map((b) => b.bot));
        const table = document.getElementById("bots-table");
        // remove groups no longer shown
        for (const id in groups) { if (!wanted.has(id)) { if (expanded.has(id)) { expanded.delete(id); const sp = sparks.get(id); if (sp) { sp.destroy(); sparks.delete(id); } } groups[id].remove(); delete groups[id]; } }
        // upsert + order
        list.forEach((b) => { if (!groups[b.bot]) { table.appendChild(makeGroup(b)); } else updateGroup(b); });
        // reorder to match sort
        list.forEach((b) => table.appendChild(groups[b.bot]));
        if (firstData) requestAnimationFrame(() => document.querySelectorAll(".row-enter").forEach((r) => r.classList.remove("row-enter")));
        // header sort arrows
        document.querySelectorAll("#bots-head th[data-sort]").forEach((th) => th.setAttribute("aria-sort", th.dataset.sort === sortKey ? (sortDir === -1 ? "descending" : "ascending") : "none"));
        // count
        const sub = list.reduce((a, b) => ({ pnl: a.pnl + (b.pnl ?? 0), volume: a.volume + b.volume }), { pnl: 0, volume: 0 });
        document.getElementById("f-count").textContent = `showing ${list.length} of ${DATA.bots.length} · PnL ${pnlStr(sub.pnl)} · vol ${usd(sub.volume)}`;
        // chart + activity
        updateChart();
        if (document.getElementById("activity").open) renderActivity();
        // timeframe option availability
        updateRangeOptions();
        document.getElementById("kpis").setAttribute("aria-busy", "false");
        // a11y live summary
        const alive = DATA.bots.filter((b) => b.enabled === true && b.lastTick && Date.now() - Date.parse(b.lastTick) < 10000).length;
        document.getElementById("live").textContent = `Updated ${relTime(DATA.asOf)}. Fleet PnL ${pnlStr(DATA.aggregate.pnl)}, ${alive} of ${DATA.aggregate.activeBots} bots alive.`;
        firstData = false;
      }
      function applyFilters() { if (DATA) { refreshFilterOptions(); applyData(); } }

      function updateRangeOptions() {
        const since = DATA && DATA.dataSince ? Date.parse(DATA.dataSince) : null;
        const span = since ? Date.now() - since : 0;
        const need = { "1h": 0, "1d": 0, "7d": 7 * 864e5, "30d": 30 * 864e5, all: 0 };
        document.querySelectorAll("#chart-range button").forEach((btn) => { const r = btn.dataset.range; btn.hidden = need[r] > 0 && span < need[r]; });
      }

      function tickRelTimes() { document.querySelectorAll("[data-ts]").forEach((el) => (el.textContent = relTime(el.dataset.ts))); if (DATA) { const asof = document.getElementById("asof"); asof.textContent = relTime(DATA.asOf); DATA.bots.forEach((b) => { const g = groups[b.bot]; if (g) { const dEl = g.querySelector(".dot"); const dc = dotClass(b); if (dEl && !dEl.classList.contains(dc)) dEl.className = "dot " + dc; } }); recomputePill(); } }

      // ── polling ──────────────────────────────────────────────────────────
      async function pollStats() {
        if (inflightStats) inflightStats.abort();
        inflightStats = new AbortController();
        try {
          const r = await fetch("/api/stats?range=" + encodeURIComponent(currentRange), { signal: inflightStats.signal });
          const d = await r.json(); statsOk = !!d.ok;
          if (d.ok) { DATA = d; applyData(); }
        } catch (e) { if (e.name !== "AbortError") statsOk = false; }
        finally { inflightStats = null; recomputePill(); }
      }
      async function pollStatus() {
        try { const t0 = performance.now(); const r = await fetch("/api/status"); STATUS = await r.json(); lastLatency = Math.round(performance.now() - t0); statusOk = !!STATUS.ok; }
        catch (e) { statusOk = false; lastLatency = null; }
        finally { recomputePill(); }
      }
      // Always fetch on call (so a background tab still loads initial data); only the
      // RECURRING poll pauses when hidden, and resumes on visibilitychange.
      async function loopStats() { try { progStart(); await pollStats(); } finally { progDone(); if (!document.hidden) statsTimer = setTimeout(loopStats, 5000); } }
      async function loopStatus() { try { await pollStatus(); } finally { if (!document.hidden) statusTimer = setTimeout(loopStatus, 10000); } }

      // ── listeners ────────────────────────────────────────────────────────
      function wireListeners() {
        const table = document.getElementById("bots-table");
        table.addEventListener("click", (e) => { const r = e.target.closest(".bot-row"); if (r) toggleBot(r.dataset.bot); });
        table.addEventListener("keydown", (e) => {
          const r = e.target.closest(".bot-row"); if (!r) return;
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleBot(r.dataset.bot); }
          else if (e.key === "ArrowRight") { if (!expanded.has(r.dataset.bot)) toggleBot(r.dataset.bot); }
          else if (e.key === "ArrowLeft") { if (expanded.has(r.dataset.bot)) toggleBot(r.dataset.bot); }
          else if (e.key === "ArrowDown" || e.key === "ArrowUp") { e.preventDefault(); const rows = [...document.querySelectorAll(".bot-row")]; const i = rows.indexOf(r); const n = rows[i + (e.key === "ArrowDown" ? 1 : -1)]; if (n) n.focus(); }
        });
        // header sort
        document.getElementById("bots-head").addEventListener("click", (e) => { const th = e.target.closest("th[data-sort]"); if (!th) return; sortBy(th.dataset.sort); });
        document.getElementById("bots-head").addEventListener("keydown", (e) => { if ((e.key === "Enter" || e.key === " ") && e.target.dataset.sort) { e.preventDefault(); sortBy(e.target.dataset.sort); } });
        // scope
        document.getElementById("f-scope").addEventListener("click", (e) => { const b = e.target.closest("button"); if (!b) return; F.scope = b.dataset.scope; document.querySelectorAll("#f-scope button").forEach((x) => x.setAttribute("aria-checked", String(x === b))); applyFilters(); });
        ["f-strategy", "f-tag", "f-market"].forEach((id) => document.getElementById(id).addEventListener("change", (e) => { F[id.slice(2)] = e.target.value; applyFilters(); }));
        document.getElementById("f-clear").addEventListener("click", () => { F.scope = "active"; F.strategy = F.tag = F.market = "all"; document.querySelectorAll("#f-scope button").forEach((x) => x.setAttribute("aria-checked", String(x.dataset.scope === "active"))); ["f-strategy", "f-tag", "f-market"].forEach((id) => (document.getElementById(id).value = "all")); applyFilters(); });
        // chart mode
        document.getElementById("chart-mode").addEventListener("click", (e) => { const b = e.target.closest("button"); if (!b) return; chartMode = b.dataset.mode; document.querySelectorAll("#chart-mode button").forEach((x) => x.setAttribute("aria-selected", String(x === b))); document.getElementById("chart").setAttribute("aria-label", (chartMode === "pnl" ? "P&L since start" : "Equity") + " per bot"); if (chart) { chart.destroy(); chart = null; } updateChart(); });
        // chart range (timeframe)
        document.getElementById("chart-range").addEventListener("click", (e) => { const b = e.target.closest("button"); if (!b || b.hidden) return; currentRange = b.dataset.range; document.querySelectorAll("#chart-range button").forEach((x) => x.setAttribute("aria-selected", String(x === b))); pollStats(); });
        // legend isolate
        document.getElementById("chart-legend").addEventListener("click", (e) => { const b = e.target.closest(".leg"); if (!b) return; isoBot = isoBot === b.dataset.bot ? null : b.dataset.bot; applyIsolation(); });
        // activity
        document.getElementById("activity").addEventListener("toggle", (e) => { if (e.target.open) renderActivity(); });
        document.getElementById("activity-tabs").addEventListener("click", (e) => { const b = e.target.closest("button"); if (!b) return; activityTab = b.dataset.tab; document.querySelectorAll("#activity-tabs button").forEach((x) => x.setAttribute("aria-selected", String(x === b))); document.getElementById("activity-orders").hidden = activityTab !== "orders"; document.getElementById("activity-decisions").hidden = activityTab !== "decisions"; });
        document.getElementById("reference").addEventListener("toggle", (e) => { if (e.target.open) renderReference(); });
        // JSON modal
        document.getElementById("json-btn").addEventListener("click", openModal);
        document.getElementById("json-modal").addEventListener("click", (e) => { if (e.target.dataset.close !== undefined || e.target.classList.contains("modal-backdrop")) closeModal(); });
        document.getElementById("jm-copy").addEventListener("click", async (e) => { try { await navigator.clipboard.writeText(JSON.stringify(DATA, null, 2)); e.target.textContent = "copied"; setTimeout(() => (e.target.textContent = "copy"), 1200); } catch (x) {} });
        // visibility
        document.addEventListener("visibilitychange", () => { if (document.hidden) { clearTimeout(statsTimer); clearTimeout(statusTimer); } else { loopStats(); loopStatus(); } });
      }
      function sortBy(key) { if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = key === "bot" ? 1 : -1; } if (DATA) applyData(); }
      let lastFocus = null;
      function openModal() { const m = document.getElementById("json-modal"); document.getElementById("jm-body").textContent = JSON.stringify(DATA, null, 2); lastFocus = document.activeElement; m.hidden = false; m.setAttribute("aria-hidden", "false"); document.body.style.overflow = "hidden"; document.getElementById("jm-close").focus(); document.addEventListener("keydown", modalKey); }
      function closeModal() { const m = document.getElementById("json-modal"); m.hidden = true; m.setAttribute("aria-hidden", "true"); document.body.style.overflow = ""; document.removeEventListener("keydown", modalKey); if (lastFocus) lastFocus.focus(); }
      function modalKey(e) { if (e.key === "Escape") closeModal(); if (e.key === "Tab") { const f = [document.getElementById("jm-copy"), document.getElementById("jm-close")]; const i = f.indexOf(document.activeElement); e.preventDefault(); f[(i + (e.shiftKey ? -1 : 1) + f.length) % f.length].focus(); } }

      // ── boot ─────────────────────────────────────────────────────────────
      mount();
      setInterval(tickRelTimes, 15000);
      loopStats();
      loopStatus();
    </script>
    <script type="module">
      let slotText;
      try { const m = await import("https://esm.sh/slot-text@0.3.1"); slotText = m.slotText || m.default; } catch (e) { slotText = null; }
      if (!slotText) {
        slotText = (el, init) => { el.textContent = init; return { set(n) { if (n === el.dataset.v) return; el.dataset.v = n; if (window.__RM) { el.textContent = n; return; } el.animate([{ transform: "translateY(0)", opacity: 1 }, { transform: "translateY(-40%)", opacity: 0 }], { duration: 130, easing: "ease-in" }).onfinish = () => { el.textContent = n; el.animate([{ transform: "translateY(40%)", opacity: 0 }, { transform: "translateY(0)", opacity: 1 }], { duration: 150, easing: "ease-out" }); }; } }; };
      }
      window.__slotText = slotText;
      window.dispatchEvent(new Event("slot-ready"));
    </script>
  </body>
</html>
